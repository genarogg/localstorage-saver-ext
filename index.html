<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LocalStorage Saver</title>
    <link rel="stylesheet" href="css/popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1" /><stop offset="100%" stop-color="#a855f7" /></linearGradient></defs><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg></span> LS Manager</h1>
            <p class="subtitle">Guarda y restaura el estado local</p>
        </header>

        <section class="tabs">
            <button class="tab-btn active" data-tab="current">Claves Actuales</button>
            <button class="tab-btn" data-tab="saved">Estados Guardados</button>
        </section>

        <section id="tab-current" class="tab-content active">
            <div class="actions-bar">
                <input type="text" id="state-name" placeholder="Nombre (ej. Estado 1)">
                <button id="save-selected-btn" class="btn primary" disabled>Guardar</button>
            </div>
            <div class="list-header">
                <label>
                    <input type="checkbox" id="select-all">
                    <span>Seleccionar todas</span>
                </label>
                <button id="refresh-btn" class="btn icon-btn" title="Refrescar LocalStorage"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg></button>
            </div>
            <ul id="current-keys-list" class="keys-list">
                <li class="empty-state">
                    <div class="loader"></div>
                    Buscando claves...
                </li>
            </ul>
        </section>

        <section id="tab-saved" class="tab-content">
            <div class="list-header" id="saved-header" style="justify-content: flex-end; display: none;">
                <button id="delete-all-btn" class="btn danger" style="padding: 6px 12px; font-size: 0.8rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Eliminar todos
                </button>
            </div>
            <ul id="saved-states-list" class="states-list">
                <li class="empty-state">No hay estados guardados aún.</li>
            </ul>
        </section>
    </div>
    
    <!-- Template para la alerta de feedback (toast) -->
    <div id="toast" class="toast hidden"></div>
    
    <script src="js/popup.js"></script>
</body>
</html>
